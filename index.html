<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>อัศวินนักอ่าน - โรงเรียนบ้านหนองโสน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00838f; --secondary: #ff9800; --bg: #f0f2f5; }
        body { font-family: 'Sarabun'; background: var(--bg); margin: 0; padding: 0; color: #333; }
        .page { display: none; max-width: 800px; margin: auto; padding: 20px; } .page.active { display: block; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-top: 100px; }
        input[type="text"] { padding: 15px; width: 80%; max-width: 300px; border-radius: 10px; border: 2px solid #ccc; font-size: 18px; text-align: center; margin-bottom: 10px; }
        .header { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 15px 15px 0 0; margin-top: 20px; flex-wrap: wrap; gap: 15px;}
        .avatar-display { width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; }
        .frame-none { border: 3px solid transparent; } .frame-gold { border: 4px solid #ffd700; box-shadow: 0 0 10px #ffd700; } .frame-fire { border: 4px solid #ff3d00; box-shadow: 0 0 15px #ff3d00; }
        .nav-tabs { display: flex; background: white; border-radius: 0 0 15px 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: bold; color: #555; } .tab.active { color: var(--primary); border-bottom: 4px solid var(--primary); background: #e0f7fa; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; text-align: center; border: 2px solid #eee; position: relative; }
        .btn { border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; font-family:'Sarabun'; }
        .btn-primary { background: var(--primary); color: white; } .btn-secondary { background: var(--secondary); color: white; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:100; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; text-align: center; }
        .reading-text { font-size: 30px; font-weight: bold; margin: 20px 0; padding: 20px; background: #fff8e1; border-radius: 15px; border: 2px dashed #ffc107; }
        .mic-btn { background: #4caf50; color: white; font-size: 20px; padding: 15px 40px; border-radius: 50px; cursor: pointer; margin:10px; border:none; box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4); }
        .mic-btn.recording { background: #f44336; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        #loadingOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:999; justify-content:center; align-items:center; flex-direction:column; }
        .spinner { border: 8px solid #f3f3f3; border-top: 8px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .select-item { width: 50px; height: 50px; border-radius: 50%; font-size: 30px; display: inline-flex; justify-content: center; align-items: center; border: 3px solid #ccc; cursor: pointer; margin:5px; } .select-item.selected { border-color: var(--primary); background: #e0f7fa; }
        
        /* ตกแต่งกล่องคะแนนให้ดูแยกส่วนกันชัดเจน */
        .score-box { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .coin-box { background: white; color: #ff9800; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="loadingOverlay"><div class="spinner"></div><h2 style="color: var(--primary);" id="loadTxt">กำลังเชื่อมต่อ...</h2></div>

    <div id="loginPage" class="page active">
        <div class="login-box">
            <h1 style="color: var(--primary);">🌟 อัศวินนักอ่าน</h1> <p>โรงเรียนบ้านหนองโสน</p>
            <input type="text" id="loginId" placeholder="รหัสนักเรียน"><br>
            <button class="btn btn-primary" onclick="login()">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="mainPage" class="page">
        <button onclick="refreshData()" class="btn" style="background:#e0f7fa; color:var(--primary); width:100%; margin-bottom:10px;">🔄 อัปเดตข้อมูล / กระดานเควส</button>

        <div class="header">
            <div style="display: flex; gap: 15px; align-items: center;">
                <div id="headerAvatar" class="avatar-display frame-none">👦</div>
                <div>
                    <div id="headerName" style="font-size: 20px; font-weight: bold;">ชื่อ</div>
                    <div id="headerRank" style="font-size: 14px; color: #b2ebf2;">ระดับ: -</div>
                </div>
            </div>
            
            <!-- 🌟 แสดงกระเป๋าคะแนน 2 ใบ -->
            <div style="display: flex; flex-direction: column; align-items: flex-end;">
                <div class="score-box">🏆 คะแนนเลื่อนยศ: <span id="headerPoints">0</span></div>
                <div class="coin-box">💰 เหรียญช็อปปิ้ง: <span id="headerCoins">0</span></div>
            </div>
        </div>

        <div class="nav-tabs">
            <div class="tab active" onclick="switchTab('qTab')">📜 ภารกิจ</div>
            <div class="tab" onclick="switchTab('sTab')">🎁 ร้านค้า</div>
            <div class="tab" onclick="switchTab('pTab')">⚙️ โปรไฟล์</div>
        </div>

        <div id="qTab" class="tab-content active"><div class="grid" id="qBox"></div></div>
        <div id="sTab" class="tab-content" style="display: none;"><div class="grid" id="sBox"></div></div>
        
        <div id="pTab" class="tab-content" style="display: none;">
            <div style="background: white; padding: 20px; border-radius: 15px;">
                <label>ชื่อ:</label><input type="text" id="eName" style="width:100%;"><br>
                <label>ตัวละคร:</label> 
                <div><div class="select-item" onclick="selP('a','👦',this)">👦</div><div class="select-item" onclick="selP('a','👧',this)">👧</div><div class="select-item" onclick="selP('a','🐱',this)">🐱</div></div>
                <label>กรอบรูป:</label> 
                <div><div class="select-item frame-none" onclick="selP('f','frame-none',this)">❌</div><div class="select-item frame-gold" onclick="selP('f','frame-gold',this)">🌟</div><div class="select-item frame-fire" onclick="selP('f','frame-fire',this)">🔥</div></div>
                <button class="btn btn-primary" onclick="saveProfile()" style="width: 100%; margin-top:15px;">บันทึกโปรไฟล์</button>
                <button class="btn" style="background: #e0e0e0; color: #333; width: 100%; margin-top:10px;" onclick="location.reload()">ออกจากระบบ</button>
            </div>
        </div>
    </div>

    <!-- หน้าต่างเล่นเกม -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <h2 id="gTitle" style="color: var(--primary);">ภารกิจ</h2>
            <div id="gProgress" style="font-weight:bold; color:#777; margin-bottom:10px;"></div>
            <div id="gText" class="reading-text"></div>
            
            <button id="micBtn" class="mic-btn" onclick="toggleMic()">🎤 กดเริ่มฟัง (ครั้งเดียว)</button>
            
            <div id="gStatus" style="font-size: 20px; margin: 15px 0; color: #555; min-height: 60px;">พร้อมแล้วกดปุ่มไมค์ได้เลย!</div>
            <button class="btn btn-secondary" onclick="closeGame()">❌ ปิดหน้าต่าง</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 🚨 วาง URL ของ Web App ตรงนี้ 🚨
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLoxr1Jc-tIu0jVbt9ijbio98M7ZetfeTPjHf_AKFY1qPXFIhbKsG9kNDqbKcVa__g1g/exec";
        // ==========================================

        let allQ = [], allS = [], allU = [], allR = [];
        
        // 🌟 เพิ่มตัวแปร coins เข้ามาในระบบผู้ใช้
        let curU = { id: "", name: "", avatar: "👦", frame: "frame-none", points: 0, coins: 0, completedQuests: [] };
        
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            if(aCtx.state === 'suspended') aCtx.resume();
            const osc = aCtx.createOscillator(); const gain = aCtx.createGain();
            osc.connect(gain); gain.connect(aCtx.destination);
            if(type === 'click') { osc.type='square'; osc.frequency.setValueAtTime(400, aCtx.currentTime); gain.gain.setValueAtTime(0.05, aCtx.currentTime); osc.start(); osc.stop(aCtx.currentTime + 0.1); }
            if(type === 'correct') { osc.type='sine'; osc.frequency.setValueAtTime(600, aCtx.currentTime); osc.frequency.setValueAtTime(800, aCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, aCtx.currentTime); osc.start(); osc.stop(aCtx.currentTime + 0.3); }
            if(type === 'wrong') { osc.type='sawtooth'; osc.frequency.setValueAtTime(200, aCtx.currentTime); osc.frequency.setValueAtTime(150, aCtx.currentTime + 0.2); gain.gain.setValueAtTime(0.1, aCtx.currentTime); osc.start(); osc.stop(aCtx.currentTime + 0.3); }
        }
        document.addEventListener('click', () => { if(aCtx.state === 'suspended') aCtx.resume(); }); 

        window.onload = loadData;
        async function loadData() {
            if(!SCRIPT_URL.includes("http")) return alert("อย่าลืมใส่ SCRIPT_URL ในโค้ดนะครับ");
            sl("กำลังโหลดข้อมูล...");
            try {
                const res = await (await fetch(SCRIPT_URL)).json();
                allQ = res.quests||[]; allS = res.shop||[]; allU = res.users||[]; allR = res.ranks||[];
                hl(); if(curU.id !== "") refreshUI(); 
            } catch(e) { alert("ล้มเหลว"); hl(); }
        }

        async function refreshData() { playSfx('click'); await loadData(); }

        function login() {
            playSfx('click');
            const id = document.getElementById('loginId').value.trim(); if(!id) return;
            const u = allU.find(x => String(x.UserID) === id);
            if(u) {
                curU = { 
                    id: id, 
                    name: u.DisplayName||"น้อง"+id, 
                    avatar: u.Avatar||"👦", 
                    frame: u.Frame||"frame-none", 
                    points: Number(u.TotalPoints)||0, 
                    // ดึงข้อมูลเหรียญช็อปปิ้งมา ถ้าเด็กเก่ายังไม่มีระบบนี้ ให้คัดลอกแต้มเดิมมาเป็นทุนเริ่มต้น
                    coins: (u.Coins !== "" && u.Coins !== undefined) ? Number(u.Coins) : (Number(u.TotalPoints)||0),
                    completedQuests: u.CompletedQuests?String(u.CompletedQuests).split(','):[] 
                };
            } else { 
                curU = { id: id, name: "น้อง "+id, avatar: "👦", frame: "frame-none", points: 0, coins: 0, completedQuests: [] }; 
            }
            document.getElementById('loginPage').classList.remove('active'); document.getElementById('mainPage').classList.add('active');
            refreshUI(); syncDB("เข้าสู่ระบบ", "เริ่มเล่นเกม");
        }

        function getRankName(pts) {
            if(!allR.length) return "นักอ่าน";
            let rName = allR[0].RankName;
            const sortedRanks = [...allR].sort((a,b)=> Number(a.MinPoints) - Number(b.MinPoints));
            for(let r of sortedRanks) { if(pts >= Number(r.MinPoints)) rName = r.RankName; }
            return rName;
        }

        function refreshUI() {
            document.getElementById('headerName').innerText = curU.name; 
            document.getElementById('headerPoints').innerText = curU.points; 
            document.getElementById('headerCoins').innerText = curU.coins; 
            document.getElementById('headerAvatar').innerText = curU.avatar; document.getElementById('headerAvatar').className = "avatar-display " + curU.frame;
            document.getElementById('headerRank').innerText = "ระดับ: " + getRankName(curU.points); // คำนวณยศจากคะแนนสะสมเท่านั้น
            
            const qb = document.getElementById('qBox'); qb.innerHTML = "";
            let availQ = allQ.filter(q => !curU.completedQuests.includes(String(q.QuestID)));
            if(!availQ.length) qb.innerHTML = "<p>🎉 ทำครบหมดแล้ว เก่งมาก!</p>";
            availQ.forEach(q => {
                const isSet = String(q.IsSet) === "true";
                qb.innerHTML += `<div class="card"><div style="position:absolute;top:10px;right:-25px;background:#4caf50;color:white;padding:5px 30px;transform:rotate(45deg);font-size:12px;">+${q.RewardPoints} เหรียญ</div>
                <h3 style="color:var(--primary);">${q.Title} ${isSet ? "(แบบชุด)" : ""}</h3><div style="color:#ff9800; margin:10px;">${q.Difficulty}</div><p style="color:#777;">ประเภท: ${q.Type}</p>
                <button class="btn btn-primary" style="width:100%;" onclick="openGame('${q.QuestID}')">รับภารกิจ</button></div>`;
            });

            const sb = document.getElementById('sBox'); sb.innerHTML = "";
            allS.forEach(s => {
                let img = s.Icon.startsWith("http") ? `<img src="${s.Icon}" style="width:80px;height:80px;object-fit:contain;margin:10px;">` : `<div style="font-size:60px;margin:10px;">${s.Icon}</div>`;
                sb.innerHTML += `<div class="card">${img}<h3>${s.ItemName}</h3><p style="color:#d32f2f;font-weight:bold;">${s.PointsRequired} เหรียญ</p><button class="btn btn-secondary" style="width:100%;" onclick="buy('${s.ItemID}',${s.PointsRequired},'${s.ItemName}')">แลก</button></div>`;
            });

            document.getElementById('eName').value = curU.name; tA = curU.avatar; tF = curU.frame;
        }

        async function syncDB(act="", det="") {
            sl("กำลังบันทึก...");
            let pay = { action: "saveUser", id: curU.id, name: curU.name, avatar: curU.avatar, frame: curU.frame, points: curU.points, coins: curU.coins, completedQuests: curU.completedQuests };
            if(act) pay.logData = { action: act, detail: det };
            try { await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type':'application/json'}, body: JSON.stringify(pay) }); hl(); } catch(e){ hl(); }
        }

        // 🌟 ตอนซื้อของ หักเฉพาะเหรียญช็อปปิ้งเท่านั้น!
        function buy(id, cost, name) {
            playSfx('click');
            if(curU.coins >= cost) { 
                if(confirm(`แลก ${name} ไหม?`)) { 
                    curU.coins -= cost; // 👈 หักแค่เหรียญช็อปปิ้ง
                    refreshUI(); 
                    syncDB("แลกรางวัล", name); 
                    alert("แลกสำเร็จ แคปจอไปรับของเลย!"); 
                } 
            } else alert("เหรียญช็อปปิ้งไม่พอจ้า ไปอ่านหนังสือเพิ่มกันเถอะ!");
        }

        let tA="", tF="";
        function selP(t, v, el) { playSfx('click'); if(t==='a') tA=v; if(t==='f') tF=v; Array.from(el.parentElement.children).forEach(c=>c.classList.remove('selected')); el.classList.add('selected'); }
        function saveProfile() { playSfx('click'); curU.name = document.getElementById('eName').value; curU.avatar = tA; curU.frame = tF; refreshUI(); syncDB("เปลี่ยนโปรไฟล์", "-"); }

        function switchTab(id) { playSfx('click'); document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none'); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById(id).style.display='block'; event.currentTarget.classList.add('active'); }
        function sl(txt) { document.getElementById('loadTxt').innerText=txt; document.getElementById('loadingOverlay').style.display='flex'; }
        function hl() { document.getElementById('loadingOverlay').style.display='none'; }

        // ระบบเกม
        let aQ = null; let qSet = []; let qIdx = 0; let isRec = false; let keepListening = false;
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition; const rec = SR ? new SR() : null;
        if(rec) {
            rec.lang = 'th-TH'; 
            rec.interimResults = false;
            rec.continuous = true; // 🌟 ระบบฟังต่อเนื่อง ไม่ตัดไมค์เอง

            rec.onresult = function(e) { 
                const lastResultIndex = e.results.length - 1;
                checkAns(e.results[lastResultIndex][0].transcript.trim()); 
            };
            rec.onerror = function(e) { document.getElementById('gStatus').innerHTML = `<span style="color:#f44336;">ไม่ได้ยินเสียง ลองพูดใหม่นะครับ</span>`; };
            rec.onend = function() { 
                if(keepListening) { 
                    try { rec.start(); } catch(e){} 
                } else {
                    isRec = false; document.getElementById('micBtn').innerText="🎤 กดเริ่มฟัง"; document.getElementById('micBtn').classList.remove('recording');
                }
            };
        }

        function openGame(id) {
            playSfx('click');
            aQ = allQ.find(x => String(x.QuestID) === String(id));
            qSet = String(aQ.Content).split('|').map(s=>s.trim()).filter(s=>s!==""); 
            qIdx = 0;
            document.getElementById('gTitle').innerText = aQ.Title;
            updateQuestView();
            document.getElementById('gStatus').innerHTML = "พร้อมแล้วกดปุ่มไมค์ <b>ครั้งเดียว</b> แล้วอ่านเลย!";
            document.getElementById('gameModal').style.display = "flex";
            keepListening = false;
        }

        function updateQuestView() {
            if(qSet.length > 1) document.getElementById('gProgress').innerText = `ข้อที่ ${qIdx+1} จาก ${qSet.length}`; else document.getElementById('gProgress').innerText = "";
            document.getElementById('gText').innerText = qSet[qIdx];
        }

        function closeGame() { playSfx('click'); document.getElementById('gameModal').style.display = "none"; keepListening = false; if(isRec) rec.stop(); }
        
        function toggleMic() {
            playSfx('click');
            if(!rec) return alert("เบราว์เซอร์ไม่รองรับ แนะนำใช้ Chrome");
            if(isRec) { keepListening = false; rec.stop(); } 
            else { 
                keepListening = true; isRec = true; 
                try { rec.start(); } catch(e){}
                document.getElementById('micBtn').innerText="🔴 กำลังฟังตลอดเวลา... (กดเพื่อหยุด)"; 
                document.getElementById('micBtn').classList.add('recording'); 
                document.getElementById('gStatus').innerText="พูดได้เลยครับ 👂";
            }
        }

        function checkAns(spk) {
            const tgt = qSet[qIdx];
            const cSpk = spk.replace(/\s/g, ''); const cTgt = tgt.replace(/\s/g, '');
            if(cSpk === cTgt || (aQ.Type === 'story' && cSpk.includes(cTgt.substring(0, Math.floor(cTgt.length/2))))) {
                playSfx('correct');
                qIdx++;
                if(qIdx >= qSet.length) {
                    keepListening = false; rec.stop();
                    document.getElementById('gStatus').innerHTML = `<span style="color:#4caf50; font-weight:bold;">🎉 เก่งมาก! ได้รับ ${aQ.RewardPoints} คะแนน</span>`;
                    
                    // 🌟 เพิ่มคะแนนใส่ทั้งกระเป๋ายศและกระเป๋าช็อปปิ้ง
                    curU.points += Number(aQ.RewardPoints); 
                    curU.coins += Number(aQ.RewardPoints); 
                    
                    curU.completedQuests.push(String(aQ.QuestID));
                    refreshUI(); syncDB("ทำภารกิจสำเร็จ", aQ.Title);
                    setTimeout(() => { closeGame(); }, 2000);
                } else {
                    document.getElementById('gStatus').innerHTML = `<span style="color:#2e7d32;">เยี่ยม! ไปข้อต่อไปเลย</span>`;
                    updateQuestView();
                }
            } else {
                playSfx('wrong');
                document.getElementById('gStatus').innerHTML = `<span style="color:#f44336; font-size:18px;">ระบบได้ยิน: <b>"${spk}"</b><br>เกือบถูกแล้ว ลองอ่านใหม่อีกรอบนะ!</span>`;
            }
        }
    </script>
</body>
</html>
